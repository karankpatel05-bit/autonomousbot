# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SmallBot Nav2 Parameters                                                   ║
# ║  Robot: 507mm L × 400mm W × 305mm H (rectangular body)                     ║
# ║  Wheel base: 140mm | Wheel Ø: 43mm | LiDAR: RPLidar A1M8 on top (z=305mm) ║
# ║  Drive: ESP32 PID differential drive via USB serial                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ═══════════════════════════════════════════════════════════════════════════════
#  AMCL — Adaptive Monte Carlo Localization
# ═══════════════════════════════════════════════════════════════════════════════
amcl:
  ros__parameters:
    use_sim_time: false

    # Particle filter
    min_particles: 200
    max_particles: 2000
    alpha_slow: 0.001
    alpha_fast: 0.1
    pf_err: 0.05
    pf_z: 0.99

    # Update thresholds — trigger update after this much motion
    update_min_d: 0.05        # 5 cm linear
    update_min_a: 0.1         # ~6 deg angular
    resample_interval: 1

    # Laser model
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    max_beams: 60

    # Odometry model — differential drive
    odom_model_type: diff-corrected
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2               # rotation noise from rotation
    alpha2: 0.2               # rotation noise from translation
    alpha3: 0.2               # translation noise from translation
    alpha4: 0.2               # translation noise from rotation
    alpha5: 0.1               # translation noise (omnidirectional only)

    # Frames
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    tf_broadcast: true
    transform_tolerance: 0.5

    # Initial pose — initialize at (0,0) automatically on startup
    set_initial_pose: true
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}

# ═══════════════════════════════════════════════════════════════════════════════
#  Map Server — serves the saved map
# ═══════════════════════════════════════════════════════════════════════════════
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""         # set by launch file argument

# ═══════════════════════════════════════════════════════════════════════════════
#  BT Navigator — Behavior Tree based navigation
# ═══════════════════════════════════════════════════════════════════════════════
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 100
    default_server_timeout: 20
    # Use the default navigate-to-pose behavior tree
    # default_nav_to_pose_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node

# ═══════════════════════════════════════════════════════════════════════════════
#  Controller Server — DWB local controller (dynamic obstacle avoidance)
# ═══════════════════════════════════════════════════════════════════════════════
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0        # 10 Hz — good for small slow robot
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5     # no lateral motion (diff drive)
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.03  # must move at least 3 cm
      movement_time_allowance: 15.0   # within 15 seconds

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.05         # 5 cm position tolerance
      yaw_goal_tolerance: 0.15        # ~8.6 deg heading tolerance
      stateful: true

    # DWB — Dynamic Window approach for local planning
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      # Velocity limits — tuned for SmallBot
      min_vel_x: 0.0                  # MUST be <= 0.0 so the bot can stop!
      min_vel_y: 0.0
      max_vel_x: 0.22                 # max forward speed m/s
      max_vel_y: 0.0                  # diff drive — no strafe
      max_vel_theta: 1.5              # max rotation rad/s
      min_speed_xy: 0.04              # Match min_vel_x
      max_speed_xy: 0.22
      min_speed_theta: 0.2            # Minimum rotational speed
      # Acceleration limits
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      # Trajectory simulation
      vx_samples: 20
      vy_samples: 1                   # diff drive
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.05
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      # Scoring critics
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ═══════════════════════════════════════════════════════════════════════════════
#  Planner Server — NavFn global planner
# ═══════════════════════════════════════════════════════════════════════════════
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]

    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5                  # goal tolerance for path planning
      use_astar: true                 # A* for faster planning
      allow_unknown: false            # don't plan through unknown space

# ═══════════════════════════════════════════════════════════════════════════════
#  Smoother Server — smooths planned paths
# ═══════════════════════════════════════════════════════════════════════════════
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: [simple_smoother]

    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ═══════════════════════════════════════════════════════════════════════════════
#  Behavior Server — recovery behaviors (spin, backup, wait)
# ═══════════════════════════════════════════════════════════════════════════════
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, wait]

    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0

# ═══════════════════════════════════════════════════════════════════════════════
#  Velocity Smoother — smooths cmd_vel for less jerky motor control
# ═══════════════════════════════════════════════════════════════════════════════
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0         # match ESP32 loop rate
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity:     [0.22, 0.0, 1.5]
    min_velocity:     [-0.22, 0.0, -1.5]
    max_accel:        [0.5, 0.0, 2.0]
    max_decel:        [-0.5, 0.0, -2.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.1] # Snap microscopic velocities to 0 to prevent jitter

# ═══════════════════════════════════════════════════════════════════════════════
#  Local Costmap — real-time obstacle detection from LiDAR
# ═══════════════════════════════════════════════════════════════════════════════
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 2                        # 2m × 2m local window
      height: 2
      resolution: 0.05               # 5 cm cells
      # Rectangular footprint: 507mm long × 520mm wide (body 400mm + 60mm wheel protrusion each side)
      # Origin at wheel axle centre (base_footprint)
      # Front-left, front-right, back-right, back-left
      robot_footprint: "[[0.2535, 0.260], [0.2535, -0.260], [-0.2535, -0.260], [-0.2535, 0.260]]"
      plugins: [obstacle_layer, inflation_layer]
      always_send_full_costmap: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0      # how fast cost drops off
        inflation_radius: 0.35        # inflate 35 cm beyond footprint edges (larger robot)

# ═══════════════════════════════════════════════════════════════════════════════
#  Global Costmap — static map + inflation for path planning
# ═══════════════════════════════════════════════════════════════════════════════
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # Same footprint as local costmap (507mm × 520mm incl. wheel protrusion)
      robot_footprint: "[[0.2535, 0.260], [0.2535, -0.260], [-0.2535, -0.260], [-0.2535, 0.260]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      always_send_full_costmap: true

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.40        # 40 cm for global planning (larger robot body)

# ═══════════════════════════════════════════════════════════════════════════════
#  Lifecycle Manager — manages all Nav2 node lifecycles
# ═══════════════════════════════════════════════════════════════════════════════
lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - smoother_server
      - behavior_server
      - bt_navigator
