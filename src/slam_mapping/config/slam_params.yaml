slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # ── Odometry ──────────────────────────────────────────────────────────────
    # Set to false for pure LiDAR scan-matching (no wheel odom required).
    # Set to true once ESP32 bridge is running and /odom is being published.
    use_odometry: false
    provide_odom_frame: true

    # ── Coordinate frames ────────────────────────────────────────────────────
    map_frame:  map
    odom_frame: odom
    base_frame: base_footprint    # main robot body frame

    # ── LaserScan input ──────────────────────────────────────────────────────
    scan_topic: /scan
    scan_subscriber_queue_size: 50
    minimum_range: 0.15           # RPLidar A1M8 minimum usable range (m)
    maximum_range: 12.0           # RPLidar A1M8 max range (m)

    # ── Scan-match update thresholds ─────────────────────────────────────────
    # Set to 0.0 / 0.0 / 0.0 to fuse every single scan (good for slow robots)
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    minimum_time_interval:  0.0
    map_update_interval:    0.3   # seconds between map publishes

    # ── TF timing ────────────────────────────────────────────────────────────
    transform_publish_period: 0.05     # 20 Hz TF
    tf_lookup_transform_timeout: 1.5

    # ── Scan matching (Ceres solver) ─────────────────────────────────────────
    ceres_linear_solver:     SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:    SCHUR_JACOBI
    ceres_trust_strategy:    LEVENBERG_MARQUARDT
    ceres_dogleg_type:       TRADITIONAL_DOGLEG
    ceres_loss_function:     None

    # Correlation search window (how far to look for scan matches)
    coarse_angle_resolution:   0.0349    # ~2 deg
    coarse_search_angle_offset: 0.349   # ±20 deg
    fine_search_angle_resolution: 0.0349
    angle_variance_penalty:    1.0
    distance_variance_penalty: 0.5

    # ── Loop closure ─────────────────────────────────────────────────────────
    do_loop_closing: true
    loop_match_minimum_chain_size:      10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine:   0.45
    loop_match_maximum_variance_fine:   0.3

    # ── Interactive mode ─────────────────────────────────────────────────────
    enable_interactive_mode: false

    # ── Resolution ───────────────────────────────────────────────────────────
    resolution: 0.05              # map cell size in metres (5 cm)
    max_laser_range: 12.0
    minimum_time_interval: 0.0
